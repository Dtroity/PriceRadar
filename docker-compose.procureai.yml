# Proviator (ex-ProcureAI) / Restaurant Procurement AI Platform
# Multi-tenant: frontend, backend, ai-service, postgres, redis, nginx, telegram-bot
# Optional: container names use proviator-* for rebranding

version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: vizor360
      POSTGRES_PASSWORD: vizor360
      POSTGRES_DB: vizor360
    ports:
      - "5432:5432"
    volumes:
      - vizor360_db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vizor360"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    container_name: proviator-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://vizor360:vizor360@postgres:5432/vizor360
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me}
      UPLOAD_DIR: /app/uploads
      FRONTEND_URL: https://vizor360.ru
      MULTI_TENANT: "true"
      AI_SERVICE_URL: http://ai-service:8000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_ENABLED: ${TELEGRAM_BOT_ENABLED:-false}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/app/keys/google.json}
      YANDEX_API_KEY: ${YANDEX_API_KEY:-}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
    volumes:
      - uploads_data:/app/uploads
      - ./keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-service:
    container_name: proviator-ai
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    container_name: proviator-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend

  telegram-bot:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["node", "dist/telegram/bot.js"]
    environment:
      DATABASE_URL: postgresql://vizor360:vizor360@postgres:5432/vizor360
      REDIS_HOST: redis
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_ENABLED: "true"
    depends_on:
      - backend
      - postgres

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
      - ai-service

volumes:
  vizor360_db_data:
  uploads_data:
